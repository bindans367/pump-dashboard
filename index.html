<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AquaEdge — Smart Irrigation Dashboard</title>

<script src="https://cdn.ably.com/lib/ably.min-1.js"></script>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@300;400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --bg:#0c1118;
  --card:#141c27;
  --card2:#1b2433;
  --border:rgba(255,255,255,.08);

  --gold:#d2b35f;
  --text:#f1ead8;
  --muted:#96a2b5;

  --green:#42b883;
  --red:#e05b5b;
  --blue:#5b8cff;
  --orange:#d18b32;

  --shadow:
  0 10px 40px rgba(0,0,0,.35);

  --radius:16px;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Outfit',sans-serif;
  overflow-x:hidden;
}

/* background */

body::before{
  content:'';
  position:fixed;
  inset:0;
  background:
  radial-gradient(circle at top left,
  rgba(210,179,95,.07),
  transparent 35%),

  radial-gradient(circle at bottom right,
  rgba(66,184,131,.07),
  transparent 35%);
  pointer-events:none;
}

/* header */

header{
  height:72px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 28px;
  border-bottom:1px solid var(--border);
  background:rgba(20,28,39,.88);
  backdrop-filter:blur(10px);
  position:sticky;
  top:0;
  z-index:50;
}

.logo{
  display:flex;
  flex-direction:column;
}

.logo h1{
  font-family:'DM Serif Display',serif;
  font-size:1.7rem;
  color:var(--gold);
}

.logo span{
  font-size:.7rem;
  letter-spacing:3px;
  color:var(--muted);
  text-transform:uppercase;
}

.conn{
  display:flex;
  align-items:center;
  gap:10px;
  font-size:.9rem;
}

.dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:#666;
}

.dot.live{
  background:var(--green);
  box-shadow:0 0 15px var(--green);
}

/* layout */

.container{
  padding:25px;
  display:grid;
  grid-template-columns:1fr 320px;
  gap:20px;
}

.left{
  display:flex;
  flex-direction:column;
  gap:20px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:22px;
  box-shadow:var(--shadow);
}

/* hero */

.hero{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:20px;
}

.hero-left{
  display:flex;
  align-items:center;
  gap:18px;
}

.orb{
  width:70px;
  height:70px;
  border-radius:50%;
  background:var(--card2);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:2rem;
  border:1px solid var(--border);
}

.orb.on{
  background:rgba(66,184,131,.12);
  border-color:var(--green);
  box-shadow:0 0 35px rgba(66,184,131,.22);
}

.hero h2{
  font-size:2rem;
  margin-bottom:5px;
}

.hero p{
  color:var(--muted);
}

.mode{
  padding:8px 18px;
  border-radius:999px;
  font-size:.8rem;
  font-weight:600;
  letter-spacing:1px;
  text-transform:uppercase;
}

.mode.auto{
  background:rgba(91,140,255,.15);
  color:var(--blue);
}

.mode.manual{
  background:rgba(209,139,50,.15);
  color:var(--orange);
}

/* sensors */

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:18px;
}

.sensor{
  background:var(--card2);
  padding:18px;
  border-radius:14px;
  border:1px solid var(--border);
}

.sensor h4{
  font-size:.8rem;
  color:var(--muted);
  margin-bottom:10px;
  letter-spacing:2px;
  text-transform:uppercase;
}

.sensor .val{
  font-size:2rem;
  font-family:'DM Mono',monospace;
}

.bar{
  height:5px;
  margin-top:14px;
  background:#222;
  border-radius:999px;
  overflow:hidden;
}

.fill{
  height:100%;
  width:0%;
  background:var(--green);
  transition:.5s;
}

/* buttons */

.controls{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
}

button{
  padding:16px;
  border:none;
  border-radius:14px;
  cursor:pointer;
  font-weight:600;
  color:white;
  transition:.2s;
  font-size:1rem;
}

button:hover{
  transform:translateY(-2px);
}

.on-btn{
  background:var(--green);
}

.off-btn{
  background:var(--red);
}

.auto-btn{
  background:var(--blue);
}

/* alerts */

.alerts{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.alert{
  padding:10px 16px;
  border-radius:10px;
  font-size:.85rem;
  border:1px solid var(--border);
}

.alert.red{
  background:rgba(224,91,91,.12);
  color:var(--red);
}

.alert.orange{
  background:rgba(209,139,50,.12);
  color:var(--orange);
}

/* sidebar */

.side{
  display:flex;
  flex-direction:column;
  gap:20px;
}

.side h3{
  margin-bottom:14px;
  color:var(--gold);
}

.stat{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
  padding-bottom:10px;
  border-bottom:1px solid rgba(255,255,255,.05);
}

.logs{
  max-height:500px;
  overflow:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.log{
  background:var(--card2);
  padding:10px;
  border-radius:10px;
  font-size:.82rem;
  border-left:4px solid var(--blue);
}

.log.on{
  border-color:var(--green);
}

.log.off{
  border-color:var(--red);
}

.log.alert{
  border-color:var(--orange);
}

@media(max-width:900px){

  .container{
    grid-template-columns:1fr;
  }

}

</style>
</head>

<body>

<header>

  <div class="logo">
    <h1>AquaEdge</h1>
    <span>Smart Irrigation Control</span>
  </div>

  <div class="conn">
    <div class="dot" id="dot"></div>
    <span id="connText">Connecting...</span>
  </div>

</header>

<div class="container">

  <!-- LEFT -->
  <div class="left">

    <!-- HERO -->
    <div class="card hero">

      <div class="hero-left">

        <div class="orb" id="orb">
          💧
        </div>

        <div>
          <h2 id="pumpState">
            Awaiting Signal
          </h2>

          <p id="pumpReason">
            —
          </p>
        </div>

      </div>

      <div class="mode auto" id="modeTag">
        AUTO
      </div>

    </div>

    <!-- ALERTS -->

    <div class="alerts">

      <div class="alert red" id="heatAlert">
        Overheat
      </div>

      <div class="alert orange" id="dryAlert">
        Dry Run
      </div>

      <div class="alert orange" id="overAlert">
        Overtime
      </div>

    </div>

    <!-- SENSORS -->

    <div class="grid">

      <div class="sensor">

        <h4>Current</h4>

        <div class="val" id="currentVal">
          —
        </div>

        <div class="bar">
          <div class="fill" id="currentBar"></div>
        </div>

      </div>

      <div class="sensor">

        <h4>Soil Moisture</h4>

        <div class="val" id="soilVal">
          —
        </div>

        <div class="bar">
          <div class="fill" id="soilBar"></div>
        </div>

      </div>

      <div class="sensor">

        <h4>Temperature</h4>

        <div class="val" id="tempVal">
          —
        </div>

        <div class="bar">
          <div class="fill" id="tempBar"></div>
        </div>

      </div>

      <div class="sensor">

        <h4>Humidity</h4>

        <div class="val" id="humVal">
          —
        </div>

        <div class="bar">
          <div class="fill" id="humBar"></div>
        </div>

      </div>

    </div>

    <!-- CONTROLS -->

    <div class="controls">

      <button class="on-btn" onclick="sendCmd('PUMP_ON')">
        Pump ON
      </button>

      <button class="off-btn" onclick="sendCmd('PUMP_OFF')">
        Pump OFF
      </button>

      <button class="auto-btn" onclick="sendCmd('AUTO')">
        AUTO
      </button>

    </div>

  </div>

  <!-- SIDEBAR -->

  <div class="side">

    <div class="card">

      <h3>System</h3>

      <div class="stat">
        <span>Pump</span>
        <span id="sPump">—</span>
      </div>

      <div class="stat">
        <span>Mode</span>
        <span id="sMode">—</span>
      </div>

      <div class="stat">
        <span>Runtime</span>
        <span id="sRuntime">—</span>
      </div>

      <div class="stat">
        <span>Last Update</span>
        <span id="sUpdate">—</span>
      </div>

    </div>

    <div class="card">

      <h3>Event Logs</h3>

      <div class="logs" id="logs"></div>

    </div>

  </div>

</div>

<script>

/* ============================================================
   ABLY
============================================================ */

const ABLY_KEY =
'9s2Zkg.PSFL3Q:qVW6NB3aSwAD0-RNNc6IwXaQwwSLQ8r65ODSXxWt3SA';

const ably =
new Ably.Realtime({
  key:ABLY_KEY
});

const pumpCh =
ably.channels.get('pump');

const cmdCh =
ably.channels.get('pump-cmd');

/* ============================================================
   CONNECTION
============================================================ */

ably.connection.on('connected',()=>{

  document.getElementById('dot')
  .classList.add('live');

  document.getElementById('connText')
  .innerText='Live';

  addLog('Connected to Ably','on');
});

/* ============================================================
   RECEIVE DATA
============================================================ */

pumpCh.subscribe(msg=>{

  let d;

  try{

    d =
    typeof msg.data === 'string'
    ? JSON.parse(msg.data)
    : msg.data;

  }catch{
    return;
  }

  if(!d || d.cmd) return;

  updateUI(d);

});

/* ============================================================
   UPDATE UI
============================================================ */

function updateUI(d){

  const pump =
  d.pump;

  const manual =
  d.manual;

  /* hero */

  document.getElementById('pumpState')
  .innerText =
  pump ? 'Pump Running' : 'Pump Stopped';

  document.getElementById('pumpReason')
  .innerText =
  d.pump_reason || '—';

  const orb =
  document.getElementById('orb');

  if(pump){

    orb.classList.add('on');

  }else{

    orb.classList.remove('on');

  }

  /* mode */

  const mode =
  document.getElementById('modeTag');

  if(manual){

    mode.className='mode manual';
    mode.innerText='MANUAL';

  }else{

    mode.className='mode auto';
    mode.innerText='AUTO';
  }

  /* values */

  setSensor(
    'currentVal',
    'currentBar',
    d.current_a,
    'A',
    d.current_a*10
  );

  setSensor(
    'soilVal',
    'soilBar',
    d.soil_pct,
    '%',
    d.soil_pct
  );

  setSensor(
    'tempVal',
    'tempBar',
    d.temp_c,
    '°C',
    d.temp_c
  );

  setSensor(
    'humVal',
    'humBar',
    d.humidity,
    '%',
    d.humidity
  );

  /* alerts */

  toggleAlert(
    'heatAlert',
    d.alert_heat
  );

  toggleAlert(
    'dryAlert',
    d.alert_dry
  );

  toggleAlert(
    'overAlert',
    d.alert_over
  );

  /* sidebar */

  document.getElementById('sPump')
  .innerText =
  pump ? 'Running' : 'Stopped';

  document.getElementById('sMode')
  .innerText =
  manual ? 'Manual' : 'Auto';

  document.getElementById('sRuntime')
  .innerText =
  formatTime(d.pump_on_sec || 0);

  document.getElementById('sUpdate')
  .innerText =
  new Date().toLocaleTimeString();

}

/* ============================================================
   SENSOR
============================================================ */

function setSensor(
  valueId,
  barId,
  val,
  unit,
  percent
){

  document.getElementById(valueId)
  .innerText =
  Number(val).toFixed(1)+unit;

  document.getElementById(barId)
  .style.width =
  Math.min(percent,100)+'%';
}

/* ============================================================
   ALERT
============================================================ */

function toggleAlert(id,on){

  const el =
  document.getElementById(id);

  el.style.opacity =
  on ? '1' : '.35';
}

/* ============================================================
   SEND COMMAND
============================================================ */

function sendCmd(cmd){

  cmdCh.publish(
    'cmd',
    JSON.stringify({cmd})
  );

  addLog(
    'Command: '+cmd,
    'on'
  );
}

/* ============================================================
   LOGS
============================================================ */

function addLog(text,type){

  const logs =
  document.getElementById('logs');

  const div =
  document.createElement('div');

  div.className =
  'log '+type;

  div.innerHTML =
  `<strong>${time()}</strong><br>${text}`;

  logs.prepend(div);

  while(logs.children.length>40){

    logs.removeChild(
      logs.lastChild
    );
  }
}

/* ============================================================
   HELPERS
============================================================ */

function time(){

  return new Date()
  .toLocaleTimeString();
}

function formatTime(sec){

  sec = Number(sec);

  const h =
  Math.floor(sec/3600);

  const m =
  Math.floor((sec%3600)/60);

  const s =
  sec%60;

  return h+'h '+m+'m '+s+'s';
}

</script>

</body>
</html>
